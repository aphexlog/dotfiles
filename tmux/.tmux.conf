##############################################################################
# Tmux Configuration
##############################################################################

##############################################################################
# General Settings
##############################################################################

# Terminal type with 256 color support
set -g default-terminal "tmux-256color"
set -a terminal-overrides ',xterm-256color:RGB'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours

# Behavior
set -g bell-action none
set -g remain-on-exit on
set -g mouse on

# Prefix key: Ctrl+s (unbind default Ctrl+b)
set -g prefix C-s
unbind C-b
bind C-a send-prefix

##############################################################################
# Status Bar
##############################################################################

set -g status-position top
set -g status-right "%H:%M"
set -g window-status-current-style "underscore"

# Change status bar color when nested (running tmux inside tmux)
%if #{TMUX}
set -g status-bg red
%endif

##############################################################################
# Vi Mode & Copy Mode
##############################################################################

# Enable vi mode
setw -g mode-keys vi
bind q copy-mode

# Copy mode navigation (vi-style with Ctrl+hjkl)
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\\ select-pane -l

# Copy mode bindings (macOS with pbcopy)
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle \; send -X begin-selection "pbcopy"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

##############################################################################
# Window Management
##############################################################################

# Navigate windows
bind < previous-window
bind > next-window

##############################################################################
# Pane Management
##############################################################################

# Create new windows/panes in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Resize panes (repeatable with -r)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Rearrange panes
bind -r C-p swap-pane -D

# Join/break panes
bind V command-prompt -p "Join pane from window:" "join-pane -h -s '%%'"
bind H command-prompt -p "Join pane from window:" "join-pane -v -s '%%'"
bind b break-pane
bind F set -w window-size

##############################################################################
# Monitoring
##############################################################################

bind m set monitor-activity

##############################################################################
# Plugins
##############################################################################

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/vim-tmux'

# Dracula theme
set -g @plugin 'dracula/tmux'
set -g @dracula-show-powerline true
set -g @dracula-fixed-location "Austin"
set -g @dracula-plugins "weather git"
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'